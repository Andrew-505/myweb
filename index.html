<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    @import url('https://cdn.jsdelivr.net/npm/galmuri@latest/dist/galmuri.css');
    h1 {
      font-family:'Galmuri9';
      text-align: center;
    }

    @media screen and (max-width: 767px) {
      body {
        background-color : #cbe9ff;
      }
    }    
    @media screen and (min-width: 768px) and (max-width: 959px) {
      body {
        background-color : #edceff;
      }
    }
    @media screen and (min-width: 960px) {
      body { 
        background-color : #d3ffce;
      }
    }
    div {
      max-width: 700px;
      margin: 0 auto;
      padding: 20px;
    }
    p {
      font-size: 14px;
      font-family:'Galmuri9';
      text-align: center;
    }
  </style>
  <title>Mirror</title>
</head>
<body>
  <h1>거울</h1>
  <div>
    <hr>
    <p>거울속에는소리가없소<br>저렇게까지조용한세상은참없을것이오</p>
    <p>거울속에도내게귀가있소<br>내말을못알아듣는딱한귀가두개나있소</p>
    <p>거울속의나는왼솝잡이오<br>내악수를받을줄모르는ㅡ악수를모르는왼손잡이오</p>
    <p>거울때문에나는거울속의나를만져보지를못하는구료마는<br>거울아니었던들내가어찌거울속의나를만나보기만이라도했겠소</p>
    <p>나는지금거울을안가졌소마는거울속에는늘거울속의내가있소<br>잘은모르지만외로된사업에골몰할께요</p>
    <p>거울속의나는참나와는반대요마는<br>또꽤닮았소<br>나는거울속의나를근심하고진찰할수없으니퍽섭섭하오</p>
    <p><b>-이상-</b></p>
  </div>
</body>
</html>
